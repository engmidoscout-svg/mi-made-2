<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Soft Little Question For Made 🌙</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.25), transparent 30%),
        linear-gradient(180deg, #182848 0%, #3d4b7a 45%, #6b7bb8 75%, #f7c8d9 100%);
      position: relative;
      color: #fff;
    }

    .moon {
      position: absolute;
      top: 70px;
      right: 100px;
      width: 95px;
      height: 95px;
      border-radius: 50%;
      background: #fff8d8;
      box-shadow: 0 0 30px rgba(255, 245, 180, 0.9);
      z-index: 1;
    }

    .moon::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 18px;
      width: 85px;
      height: 85px;
      border-radius: 50%;
      background: rgba(24, 40, 72, 0.9);
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
      opacity: 0.8;
      animation: twinkle 2.8s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.8); }
    }

    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.16);
      border-radius: 999px;
      filter: blur(2px);
      z-index: 1;
    }

    .cloud.one {
      width: 220px;
      height: 70px;
      left: 60px;
      top: 120px;
    }

    .cloud.two {
      width: 170px;
      height: 55px;
      right: 180px;
      top: 180px;
    }

    .card {
      width: 92%;
      max-width: 560px;
      padding: 34px 28px;
      border-radius: 28px;
      text-align: center;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 12px 40px rgba(0,0,0,0.20);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 5;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 14px;
      margin-bottom: 18px;
      letter-spacing: 0.3px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 12px;
      color: #fff7fb;
      text-shadow: 0 2px 10px rgba(0,0,0,0.18);
    }

    #message {
      font-size: 21px;
      line-height: 1.7;
      color: #fff;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
    }

    .sub {
      font-size: 14px;
      color: rgba(255,255,255,0.82);
      margin-top: 8px;
      margin-bottom: 20px;
    }

    .buttons {
      position: relative;
      min-height: 92px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 17px;
      transition: 0.3s ease;
    }

    #nextBtn, #yesBtn {
      background: linear-gradient(135deg, #ff9ec7, #ffb7d7);
      color: #4a2440;
      box-shadow: 0 8px 20px rgba(255, 165, 201, 0.35);
      font-weight: 600;
    }

    #nextBtn:hover, #yesBtn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    #noBtn {
      background: rgba(255,255,255,0.20);
      color: white;
      border: 1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
    }

    #noBtn:hover {
      background: rgba(255,255,255,0.28);
    }

    .final-title {
      font-size: 34px;
      margin-bottom: 14px;
      color: #fff9fd;
    }

    .final-text {
      font-size: 22px;
      line-height: 1.7;
      color: white;
      margin-bottom: 10px;
    }

    .small-note {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      margin-top: 8px;
    }

    .petal {
      position: absolute;
      top: -30px;
      font-size: 20px;
      pointer-events: none;
      animation: fall linear forwards;
      z-index: 3;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) translateX(60px) rotate(360deg);
        opacity: 0;
      }
    }

    .glow {
      position: absolute;
      width: 260px;
      height: 260px;
      background: rgba(255, 190, 220, 0.16);
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
    }

    .glow.one {
      left: -70px;
      bottom: -70px;
    }

    .glow.two {
      right: -80px;
      top: -80px;
    }

    @media (max-width: 640px) {
      h1 { font-size: 25px; }
      #message { font-size: 19px; min-height: 130px; }
      .moon { top: 35px; right: 30px; width: 75px; height: 75px; }
      .moon::after { width: 66px; height: 66px; top: 8px; left: 15px; }
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="moon"></div>
  <div class="cloud one"></div>
  <div class="cloud two"></div>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <div class="card" id="card">
    <div class="badge">anime-inspired little moment 🌸</div>
    <h1>For Made 🌙</h1>
    <div id="message">Hi Made… Mi made this soft little page just for you ✨</div>
    <div class="sub">A calm, cute, little question is coming...</div>

    <div class="buttons" id="buttons">
      <button id="nextBtn">Continue ✨</button>
    </div>
  </div>

  <script>
    // Create stars
    for (let i = 0; i < 24; i++) {
      const star = document.createElement("div");
      star.className = "star";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 65 + "vh";
      star.style.animationDelay = (Math.random() * 3) + "s";
      star.style.opacity = Math.random() * 0.9;
      document.body.appendChild(star);
    }

    // Falling petals
    function createPetal() {
      const petal = document.createElement("div");
      petal.className = "petal";
      petal.innerHTML = Math.random() > 0.4 ? "🌸" : "✨";
      petal.style.left = Math.random() * 100 + "vw";
      petal.style.animationDuration = (6 + Math.random() * 5) + "s";
      petal.style.fontSize = (16 + Math.random() * 12) + "px";
      document.body.appendChild(petal);

      setTimeout(() => {
        petal.remove();
      }, 12000);
    }

    setInterval(createPetal, 700);

    const steps = [
      "Hi Made… Mi made this soft little page just for you ✨",
      "I wanted to ask you something in a sweeter, calmer way 🌸",
      "Because some feelings deserve a gentle little moment under the stars 🌙",
      "And because you are really special to Mi 💖",
      "So here is the question...",
      "Made, would you like to go on a cute date with Mi? 🌸💫"
    ];

    let step = 0;

    const message = document.getElementById("message");
    const buttons = document.getElementById("buttons");
    const card = document.getElementById("card");
    const nextBtn = document.getElementById("nextBtn");

    nextBtn.addEventListener("click", () => {
      step++;
      if (step < steps.length - 1) {
        message.innerHTML = steps[step];
      } else {
        message.innerHTML = steps[steps.length - 1];
        showChoiceButtons();
      }
    });

    function showChoiceButtons() {
      buttons.innerHTML = `
        <button id="yesBtn">Yes, I would 💖</button>
        <button id="noBtn">Not yet 🌸</button>
      `;

      const yesBtn = document.getElementById("yesBtn");
      const noBtn = document.getElementById("noBtn");

      let noCount = 0;
      const noTexts = [
        "Not yet 🌸",
        "Are you sure? ✨",
        "Maybe think again? 🥺",
        "It could be really cute 🌙",
        "Mi will still hope 💖"
      ];

      function moveNoGently() {
        noCount++;
        noBtn.textContent = noTexts[Math.min(noCount, noTexts.length - 1)];

        noBtn.style.position = "absolute";
        const maxLeft = Math.max(20, buttons.clientWidth - 140);
        const left = Math.random() * maxLeft;
        const top = Math.random() * 35 + 35;

        noBtn.style.left = left + "px";
        noBtn.style.top = top + "px";
      }

      noBtn.addEventListener("mouseover", moveNoGently);
      noBtn.addEventListener("click", moveNoGently);

      yesBtn.addEventListener("click", () => {
        card.innerHTML = `
          <div class="badge">best ending unlocked 🌸</div>
          <div class="final-title">Yaaay! ✨</div>
          <div class="final-text">Made said yes to Mi 💖</div>
          <div class="final-text">This feels like the sweetest anime ending scene ever 🌙🌸</div>
          <div class="small-note">Now Mi is officially very, very happy ✨</div>
        `;

        for (let i = 0; i < 18; i++) {
          setTimeout(createPetal, i * 120);
        }
      });
    }
  </script>

</body>
</html>
